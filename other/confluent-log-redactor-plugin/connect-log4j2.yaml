Configuration:
  name: "Log4j2"

  Appenders:
    Console:
      name: STDOUT
      target: SYSTEM_OUT
      PatternLayout:
        Pattern: "[%d] %p %X{connector.context}%m (%c:%L)%n"

    Rewrite:
      - name: RedactorAppender
        RedactorPolicy:
          name: "io.confluent.log4j2.redactor.RedactorPolicy"
          rules: "/opt/connect/connect-log-redactor-rules.json"
          refreshInterval: 60000
        AppenderRef:
          - ref: STDOUT

  Loggers:
    Root:
      level: "INFO"
      AppenderRef:
        - ref: RedactorAppender
