---
apiVersion: platform.confluent.io/v1beta1
kind: KRaftController
metadata:
  name: kraftcontroller
  namespace: confluent
spec:
  replicas: 1
  dataVolumeCapacity: 10Gi
  metrics: {}
  image:
    application: ${CP_SERVER_IMAGE}:${CP_SERVER_TAG}
    init: ${CP_INIT_IMAGE}:${CFK_VERSION}
  listeners:
    controller:
      tls:
        enabled: false
  configOverrides:
    server:
      - default.replication.factor=1
---
apiVersion: platform.confluent.io/v1beta1
kind: Kafka
metadata:
  name: kafka
  namespace: confluent
spec:
  replicas: 1
  metrics: {}
  image:
    application: ${CP_SERVER_IMAGE}:${CP_SERVER_TAG}
    init: ${CP_INIT_IMAGE}:${CFK_VERSION}
  dataVolumeCapacity: 10Gi
  metricReporter:
    enabled: true
  dependencies:
    kRaftController:
      clusterRef:
        name: kraftcontroller
        namespace: confluent
  configOverrides:
    server:
      - offsets.topic.replication.factor=1
      - transaction.state.log.replication.factor=1
      - confluent.license.topic.replication.factor=1
      - confluent.metadata.topic.replication.factor=1
      - confluent.balancer.topic.replication.factor=1
      - confluent.metrics.reporter.topic.replicas=1
      - confluent.security.event.logger.exporter.kafka.topic.replicas=1
      - auto.create.topics.enable=true
---
apiVersion: platform.confluent.io/v1beta1
kind: Connect
metadata:
  name: connect
  namespace: confluent
spec:
  replicas: 1
  metrics: {}
  image:
    application: ${CP_CONNECT_IMAGE}:${CP_CONNECT_TAG}
    init: ${CP_INIT_IMAGE}:${CFK_VERSION}
  podTemplate:
    podSecurityContext:
      fsGroup: 1000
      runAsUser: 1000
      runAsNonRoot: true
  dependencies:
    kafka:
      bootstrapEndpoint: kafka:9071
  configOverrides:
    log4j2:
      Configuration:
        Loggers:
          Logger:
            - name: org.apache.kafka.connect.runtime.rest.RestServer
              level: ERROR
              additivity: false
              AppenderRef:
                - ref: stdout
            - name: org.reflections
              level: ERROR
              additivity: false
              AppenderRef:
                - ref: stdout
    server:
      - offset.storage.replication.factor=1
      - status.storage.replication.factor=1
      - config.storage.replication.factor=1
      - confluent.topic.replication.factor=1
      - plugin.path=/usr/share/confluent-hub-components,/mnt/plugins,/usr/share/filestream-connectors

      - confluent.topic.bootstrap.servers=kafka:9071
      - confluent.topic.replication.factor=1
      - producer.enable.metrics.push=true

      - key.converter=org.apache.kafka.connect.storage.StringConverter
      - value.converter=io.confluent.connect.avro.AvroConverter
      - value.converter.schemas.enable=false
      - value.converter.schema.registry.url=http://schemaregistry:8081
---
apiVersion: platform.confluent.io/v1beta1
kind: SchemaRegistry
metadata:
  name: schemaregistry
  namespace: confluent
spec:
  replicas: 1
  metrics: {}
  image:
    application: ${CP_SCHEMA_REGISTRY_IMAGE}:${CP_SCHEMA_REGISTRY_TAG}
    init: ${CP_INIT_IMAGE}:${CFK_VERSION}
---
apiVersion: platform.confluent.io/v1beta1
kind: ControlCenter
metadata:
  name: controlcenter
  namespace: confluent
spec:
  replicas: 1
  internalTopicReplicatorFactor: 1
  metrics: {}
  image:
    application: ${CP_CONTROL_CENTER_IMAGE}:${CP_CONTROL_CENTER_TAG}
    init: ${CP_INIT_IMAGE}:${CFK_VERSION}
  dataVolumeCapacity: 10Gi
  dependencies:
    schemaRegistry:
      url: http://schemaregistry.confluent.svc.cluster.local:8081
    connect:
      - name: connect
        url: http://connect.confluent.svc.cluster.local:8083