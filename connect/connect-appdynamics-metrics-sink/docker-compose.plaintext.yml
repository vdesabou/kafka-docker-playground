---
services:
  # Mock of the AppDynamics machine agent HTTP metric listener.
  # A real machine agent needs an AppDynamics account + Controller before it
  # opens its listener, so it cannot run self-contained in CI. This stub only
  # reproduces the listener contract the connector relies on: it accepts
  # POST /api/v1/metrics and returns HTTP 204. See mock-machine-agent.py.
  appdynamics-metrics:
    image: python:3-alpine
    hostname: appdynamics-metrics
    container_name: appdynamics-metrics
    volumes:
      - ../../connect/connect-appdynamics-metrics-sink/docker-appdynamics-metrics/mock-machine-agent.py:/mock.py:ro
    command: ["python", "/mock.py"]
    # No host port mapping needed (but set for cfk): the connector reaches the mock over the compose
    # network (appdynamics-metrics:8293) and the test verifies via container
    # logs, so nothing needs the port on the host. Not publishing it avoids
    # host-port collisions when tests run in parallel.
    ports:
      - "8293:8293"

  connect:
    depends_on:
      - appdynamics-metrics
    environment:
      CONNECT_PLUGIN_PATH: /usr/share/confluent-hub-components/confluentinc-kafka-connect-appdynamics-metrics
